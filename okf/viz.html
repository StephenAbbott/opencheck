<head>
<meta charset="utf-8" />

<title>OpenCheck OKF — OKF browser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.2/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root { --bg:#f3f3f5; --panel:#fff; --rule:#e5e5e5; --ink:#191d23; --muted:#757575; --accent:#3d30d4; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:var(--ink); background:var(--bg); }
  #app { display:grid; grid-template-columns: 280px 1fr 420px; height:100vh; }
  #side, #detail { background:var(--panel); border-right:1px solid var(--rule); overflow:auto; padding:14px; }
  #detail { border-right:none; border-left:1px solid var(--rule); }
  #cy { height:100vh; }
  h1 { font-size:15px; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:12px; margin:0 0 12px; }
  input[type=search]{ width:100%; padding:7px 9px; border:1px solid var(--rule); border-radius:6px; font-size:13px; margin-bottom:10px;}
  .types label { display:flex; align-items:center; gap:7px; font-size:12.5px; padding:3px 0; cursor:pointer; }
  .swatch { width:11px;height:11px;border-radius:50%; display:inline-block; }
  .eyebrow { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:14px 0 4px; }
  #detail h2 { font-size:16px; margin:0 0 2px; }
  #detail .desc { color:var(--muted); font-size:13px; margin:0 0 10px; }
  .chip { display:inline-block; font-size:11px; background:var(--bg); border:1px solid var(--rule); border-radius:999px; padding:2px 8px; margin:0 4px 4px 0; }
  .body { font-size:13.5px; line-height:1.6; }
  .body h1{font-size:15px;margin:16px 0 6px;} .body h2{font-size:13.5px;margin:14px 0 5px;}
  .body table{border-collapse:collapse;font-size:12px;} .body td,.body th{border:1px solid var(--rule);padding:4px 7px;text-align:left;}
  .body code{background:var(--bg);padding:1px 4px;border-radius:4px;font-size:12px;}
  .body pre{background:var(--bg);padding:10px;border-radius:8px;overflow:auto;}
  .body a{color:var(--accent);text-decoration:none;} .body a:hover{text-decoration:underline;}
  a.res { color:var(--accent); font-size:12px; text-decoration:none; } a.res:hover{text-decoration:underline;}
  .backlinks a { display:block; font-size:12.5px; color:var(--accent); text-decoration:none; padding:2px 0; }
  .empty { color:var(--muted); font-size:13px; }
</style>
</head>

  <div id="side">
    <h1>OpenCheck OKF</h1>

<script>
const BUNDLE = {"name": "OpenCheck OKF", "concepts": [{"id": "api/deepen", "type": "API Endpoint", "title": "Deepen & lookup-source", "description": "Fetch the full record for a single hit and map it to BODS; re-run one source for an existing lookup.", "resource": null, "tags": ["api", "deepen", "bods"], "body": "# Overview\n\n- `GET /deepen?source=<id>&hit_id=<id>` \u2014 fetch the full record for one hit from\n  one [source](/sources/), map it to [BODS v0.4](/standards/bods.md), and assess\n  risk. Returns `raw`, `bods`, `bods_issues`, `license`, `license_notice`,\n  `risk_signals`.\n- `GET /lookup-source?lei=<LEI>&source_id=<id>` \u2014 re-run a single source for an\n  existing LEI lookup (the UI's per-source \"retry source\"), invalidating that\n  LEI's replay cache.\n\n# Raw-data policy\n\nFor sources whose licence forbids re-publication of raw records (e.g.\nOpenCorporates), `/deepen` returns a **redaction notice** in the `raw` field\ninstead of the source payload; the mapped `bods` is unaffected.\n\n# Citations\n\n- /standards/bods.md\n- /licensing/matrix.md\n", "links": ["standards/bods"]}, {"id": "api/export", "type": "API Endpoint", "title": "Export", "description": "Download a reproducible BODS v0.4 bundle for a subject, with manifest and per-source licence notes.", "resource": null, "tags": ["api", "export", "bods", "licensing"], "body": "# Overview\n\n`GET /export?lei=<LEI>&format=<zip|json|jsonl|xml|senzing|ftm|gql|amlai>` (or\n`?q=<query>`) downloads a reproducible [BODS v0.4](/standards/bods.md) bundle\nfor the subject, or a projection of it into a partner ecosystem's format.\n\n# Formats\n\n| Format | Contents |\n|---|---|\n| `json` | Pretty-printed array of BODS statements. |\n| `jsonl` | Newline-delimited BODS statements. |\n| `xml` | Canonical BODS XML. |\n| `senzing` | Newline-delimited Senzing JSON entity records (entity resolution). |\n| `ftm` | Newline-delimited FollowTheMoney entities (OpenSanctions / OpenAleph). |\n| `gql` | Zip: BigQuery property-graph CSV tables + `CREATE PROPERTY GRAPH` DDL + 14 GQL (ISO/IEC 39075) queries + README + `LICENSES.md`, via [bods-gql](https://github.com/StephenAbbott/bods-gql). |\n| `amlai` | Zip: Google AML AI input tables (`party` / `party_supplementary_data` / `account_party_link` NDJSON) + README + `LICENSES.md`, via [bods-aml-ai](https://github.com/StephenAbbott/bods-aml-ai). |\n| `zip` | `bods.json` + `bods.jsonl` + `bods.xml` + `senzing.jsonl` + `ftm.jsonl` + `manifest.json` + `LICENSES.md`. |\n\n# Licensing in the bundle\n\nThe ZIP's `manifest.json` carries a `licensing` block and `LICENSES.md` leads\nwith a **compatibility verdict** (commercial use / attribution / share-alike)\nplus a per-source traffic-light table \u2014 the same data as the\n[licensing matrix](/licensing/matrix.md). The most-restrictive source licence\ngoverns the combined bundle.\n\n# Citations\n\n- /standards/bods.md\n- /licensing/matrix.md\n", "links": ["standards/bods", "licensing/matrix"]}, {"id": "api/license-matrix", "type": "API Endpoint", "title": "License matrix", "description": "Per-source licence terms and the combined commercial-use verdict for a set of contributing sources.", "resource": null, "tags": ["api", "licensing", "compliance"], "body": "# Overview\n\n`GET /license-matrix` returns the full licensing catalogue: every\n[source's](/sources/) licence classified into structured terms (commercial use,\nattribution, share-alike, redistribution, traffic-light colour) plus the\ndistinct licence list and a disclaimer.\n\n`GET /license-matrix?sources=<a,b,c>` additionally returns an `assessment` \u2014 the\ncombined verdict for those contributing sources (the export \"licensing\nassistant\"). The most-restrictive licence wins, so one non-commercial source\nmakes the whole set non-commercial.\n\n# Response\n\n`{ disclaimer, sources: [{source_id, name, license, terms}], licenses: [terms], assessment? }`\nwhere `terms` has `commercial_use` (yes/no/conditional), `attribution_required`,\n`share_alike`, `redistribution`, `color`, `summary`.\n\n# Citations\n\n- /licensing/matrix.md\n", "links": []}, {"id": "api/lookup", "type": "API Endpoint", "title": "Lookup", "description": "The LEI-anchored synthesis \u2014 resolve a company across sources and return a unified BODS v0.4 view.", "resource": null, "tags": ["api", "lookup", "bods", "sse"], "body": "# Overview\n\n`GET /lookup?lei=<LEI>&deepen_top=<n>` runs the full\n[lookup pipeline](/architecture.md): resolve the GLEIF anchor, derive national\nidentifiers, dispatch the relevant [sources](/sources/), map each to\n[BODS v0.4](/standards/bods.md), reconcile, and assess risk.\n\n`GET /lookup-stream?lei=<LEI>` is the same pipeline served as **Server-Sent\nEvents** \u2014 `gleif_done`, per-source `hit` / `source_error`, and a final `done`\nevent \u2014 so a UI can render progressively. Both paths share one generator and\ncannot diverge.\n\n# Parameters\n\n| Param | Description |\n|---|---|\n| `lei` | ISO 17442 Legal Entity Identifier (20 chars). Required. |\n| `deepen_top` | How many top hits to deepen + map + assess (default 3). |\n| `refresh` | Bypass the short-lived replay cache. |\n\n# Response\n\nA `LookupResponse`: `lei`, `legal_name`, `jurisdiction`, `derived_identifiers`,\n`hits` (per-source results; raw payloads are redacted for sources that forbid\nre-publication), `bods` (the merged BODS statements), `cross_source_links`,\n`risk_signals`, `license_notices`.\n\n# Citations\n\n- /architecture.md\n- /standards/bods.md\n", "links": ["architecture", "standards/bods"]}, {"id": "api/person-check", "type": "API Endpoint", "title": "Person check", "description": "On-demand screening of one named person across every person-capable source, plus officer appointments (BackgroundCheck).", "resource": null, "tags": ["api", "person", "screening", "pep", "sanctions"], "body": "# Overview\n\n- `GET /person-check?name=<name>&birth_year=<yyyy>` \u2014 screen one person, on\n  demand, across every source adapter that supports person queries (UK\n  Companies House officer search, OpenSanctions, EveryPolitician, Wikidata,\n  OpenAleph, \u2026). Backs the **BackgroundCheck** view, which lists the people\n  connected to an entity (officers, directors and beneficial owners from the\n  assembled [BODS](/standards/bods.md) bundle) and runs this endpoint per\n  person.\n- `GET /person-appointments?officer_id=<id>` \u2014 every Companies House\n  appointment recorded under one officer identifier, with the BODS\n  `personStatement` carrying the `GB-COH-OFFICER` identifier. Unlike the\n  name-based screen, this is the register's own same-person assertion.\n- `GET /person-positions?entity_id=<id>` \u2014 the positions-held history behind\n  an EveryPolitician / OpenSanctions PEP record: post, country and start/end\n  dates, most recent first, keyed to the record's Wikidata Q-ID, with\n  Poliloom maintenance attribution and the PEP coverage caveat.\n\nThe person-check response contains every hit **scored against the queried\nname** (`name_score`, `birth_year_compatible`, `strong`), deterministic risk\nsignals derived from **strong matches only** (each carrying an\n`evidence.match` block), a `weak_match_count`, `cross_source_links` between\nstrong matches sharing an identifier (Wikidata Q-ID, OpenSanctions id),\nper-source outcome records (attribution, licence, hit count, error), and\nexplicit caveats.\n\n# Notes\n\nPerson screening is name-based \u2014 there is no LEI-grade identifier for people \u2014\nso the endpoint never asserts identity. A \"strong match\" requires name\nsimilarity \u2265 0.88 (the same threshold as the\n[related-party cross-check](/api/lookup.md)) *and* a compatible birth year\nwhere both sides carry one. A source that errors is reported as unscreened\nrather than silently dropped, and an empty result is not presented as a clean\nscreen.\n\n# Citations\n\n- /api/lookup.md\n- /api/search-report.md\n- /standards/bods.md\n", "links": ["standards/bods", "api/lookup"]}, {"id": "api/search-report", "type": "API Endpoint", "title": "Search & report", "description": "Free-text company/person search across sources, and a one-shot synthesis report.", "resource": null, "tags": ["api", "search", "report"], "body": "# Overview\n\n- `GET /search?q=<query>&kind=<entity|person>` \u2014 fan out the query to every\n  source adapter and return reconciled `hits`. Also available as an SSE stream\n  (`/stream`) that yields hits as each source responds.\n- `GET /report?q=<query>&kind=&deepen_top=<n>` \u2014 the same search, then deepen\n  the top N hits, map them to [BODS](/standards/bods.md), reconcile and assess\n  risk in one call. Same response shape as [/lookup](/api/lookup.md) minus the\n  LEI echo.\n\n# Notes\n\nFree-text search is best-effort name matching; the\n[LEI-anchored lookup](/api/lookup.md) is the precise path when an LEI is known.\nRaw payloads from sources that forbid re-publication (e.g. OpenCorporates) are\nredacted from `hits`.\n\n# Citations\n\n- /api/lookup.md\n", "links": ["standards/bods", "api/lookup"]}, {"id": "api/sources", "type": "API Endpoint", "title": "Sources & health", "description": "The source catalogue and a liveness probe.", "resource": null, "tags": ["api", "sources", "health"], "body": "# Overview\n\n- `GET /sources` \u2014 the catalogue of registered data sources: each source's\n  `id`, `name`, `homepage`, `description`, `license`, `attribution`, `category`\n  (cdd/esg), `is_national_register`, `supports`, `requires_api_key`,\n  `live_available`. Mirrors [sources/](/sources/) in this bundle.\n- `GET /health` \u2014 liveness probe used by the deployment platform.\n\n# Citations\n\n- /sources/\n", "links": []}, {"id": "architecture", "type": "Architecture", "title": "OpenCheck architecture", "description": "The request-to-BODS pipeline \u2014 source adapters, the LEI-anchored lookup, the BODS mapper, the reconciler, the risk engine, and the React frontend.", "resource": "https://github.com/StephenAbbott/opencheck", "tags": ["architecture", "fastapi", "pipeline", "bods"], "body": "# Shape\n\n- **Backend:** Python / FastAPI, deployed on Render. Routers live in\n  `backend/opencheck/routers/` (search, lookup, export, deepen, licensing).\n- **Frontend:** React + Vite + TypeScript, with a Cytoscape.js ownership graph.\n- **Source adapters:** one per data source in `backend/opencheck/sources/`,\n  registered in a single `REGISTRY`. See [sources/](/sources/).\n- **BODS mapper:** `backend/opencheck/bods/mapper.py` \u2014 a `map_<source_id>()`\n  function per source turns raw payloads into [BODS v0.4](/standards/bods.md).\n\n# The lookup pipeline\n\nA single async generator drives both `/lookup` and `/lookup-stream`, so the\nsync and streaming paths cannot diverge:\n\n```\n1. Resolve the GLEIF anchor record for the LEI (see lei-anchoring).\n2. Derive local identifiers (national company numbers) from the anchor's\n   registeredAs + RA code.\n3. Dispatch the relevant source adapters in parallel, each with a\n   per-source wall-clock timeout.\n4. Convert each source result to a neutral SourceHit, then map to BODS v0.4.\n5. Reconcile hits across sources by shared identifiers (LEI, company number,\n   Wikidata QID).\n6. Assess structural + cross-source risk signals.\n7. Stream results as Server-Sent Events; the sync endpoint collects them.\n```\n\nCompleted runs are cached briefly and are addressable by `?lei=`, so a refresh\nor shared URL replays instantly.\n\n# Self-describing adapters\n\nEach national-register adapter declares its own lookup wiring (which RA codes\nderive its identifier, its dispatch keys, its timeout) as class attributes. The\npipeline builds its dispatch tables from the registry at import time, so adding\na source touches only: the adapter module, its schema, one registry line, one\n`map_<source>()` mapper, one hit builder, and its tests.\n\n# Cross-cutting concerns\n\n- **Risk engine** (`risk.py`, `cross_check.py`): structural signals\n  (jurisdiction/FATF/trust/nominee/complex-layers) and name-match\n  sanctioned/PEP cross-checks, attached to the relevant BODS statements.\n- **Reconciler** (`reconcile.py`): asserts cross-source corroboration only when\n  a source independently publishes an identifier.\n- **Licensing** (`licensing.py`): classifies each source's licence and computes\n  a combined commercial-use verdict for exports. See\n  [licensing/matrix.md](/licensing/matrix.md).\n- **Raw-data policy:** sources whose licence forbids raw re-publication (e.g.\n  OpenCorporates) have their raw payload redacted from all API responses and\n  exports; the derived BODS output is unaffected.\n\n# Citations\n\n- https://github.com/StephenAbbott/opencheck\n", "links": ["standards/bods", "licensing/matrix"]}, {"id": "glossary", "type": "Reference", "title": "Beneficial-ownership glossary", "description": "Key terms used across OpenCheck \u2014 beneficial owner, UBO, PSC, RLE, LEI, nominee, and the BODS statement types.", "resource": null, "tags": ["glossary", "terminology", "beneficial-ownership"], "body": "# Terms\n\n| Term | Meaning |\n|---|---|\n| **Beneficial owner (BO)** | The natural person(s) who ultimately own or control a legal entity, directly or indirectly. |\n| **UBO** | Ultimate Beneficial Owner \u2014 the BO at the top of an ownership chain. |\n| **PSC** | Person with Significant Control \u2014 the UK's term for a beneficial owner of a company, filed at Companies House. |\n| **RLE** | Relevant Legal Entity \u2014 a corporate PSC (an entity, not a person, that holds significant control). |\n| **LEI** | Legal Entity Identifier \u2014 a 20-character ISO 17442 global identifier issued via GLEIF. OpenCheck uses it as the anchor for lookups (see [lei-anchoring](/standards/lei-anchoring.md)). |\n| **GLEIF** | Global Legal Entity Identifier Foundation \u2014 issues and publishes LEI data, including Level 2 ownership relationships. |\n| **RA code** | GLEIF Registration Authority code identifying the national register a company is registered at (e.g. `RA000585` = UK Companies House). |\n| **Nominee arrangement** | An agreement where one party (the nominee) holds an interest on behalf of another (the nominator). Modelled in BODS as a synthetic `arrangement`/`nomination` entity. |\n| **ROE** | UK Register of Overseas Entities \u2014 overseas entities owning UK land must declare their beneficial owners. |\n| **BODS** | Beneficial Ownership Data Standard \u2014 the open standard OpenCheck emits. See [standards/bods.md](/standards/bods.md). |\n| **BOVS** | Beneficial Ownership Visualisation System \u2014 Open Ownership's conventions for drawing ownership graphs. |\n| **Entity statement** | A BODS record describing a legal entity (company, arrangement). |\n| **Person statement** | A BODS record describing a natural person. |\n| **Relationship statement** | A BODS record describing an ownership-or-control link between an interested party and a subject. |\n| **Interest type** | The kind of control in a relationship \u2014 e.g. `shareholding`, `votingRights`, `seniorManagingOfficial`, `nominee`, `unknownInterest`. |\n\n# Citations\n\n- https://standard.openownership.org/en/0.4.0/\n- https://www.openownership.org/en/\n", "links": ["standards/lei-anchoring", "standards/bods"]}, {"id": "licensing/matrix", "type": "Reference", "title": "Licensing compatibility matrix", "description": "Per-source licence terms (commercial use, attribution, share-alike) for combining OpenCheck data in exports. Most-restrictive licence wins.", "resource": "/license-matrix", "tags": ["licensing", "export", "compliance"], "body": "# Source licence matrix\n\nGenerated from the live registry. The OpenCheck `/license-matrix` API endpoint and the `LICENSES.md` in every export bundle carry the same data.\n\n| Source | Licence | Commercial | Attribution | Share-alike |\n|---|---|---|---|---|\n| Australian Business Register (ABN Lookup) (`abr_australia`) | `CC-BY-3.0-AU` | yes | yes | no |\n| ARES (Czechia) (`ares`) | `CC-BY-4.0` | yes | yes | no |\n| Estonian e-Business Register (e-\u00c4riregister) (`ariregister`) | `CC-BY-4.0` | yes | yes | no |\n| Belgian Crossroads Bank for Enterprises (BCE/KBO) (`bce_belgium`) | `Custom-KBO-Reuse` | conditional | yes | no |\n| Bolagsverket \u2014 Swedish Companies Registration Office (`bolagsverket`) | `SE-PSI` | yes | yes | no |\n| Br\u00f8nn\u00f8ysundregistrene \u2014 Norwegian Register Centre (`brreg`) | `NLOD-2.0` | yes | yes | no |\n| Global Energy Monitor / Climate TRACE (`climatetrace`) | `CC-BY-4.0` | yes | yes | no |\n| Receita Federal \u2014 CNPJ register (Brazil) (`cnpj_brazil`) | `BR-Open-Data` | conditional | yes | no |\n| UK Companies House (`companies_house`) | `OGL-3.0` | yes | yes | no |\n| Corporations Canada \u2014 ISED federal register (`corporations_canada`) | `OGL-Canada-2.0` | yes | yes | no |\n| CRO \u2014 Companies Registration Office Ireland (`cro`) | `CC-BY-4.0` | yes | yes | no |\n| CVR \u2014 Det Centrale Virksomhedsregister (`cvr_denmark`) | `Danish Open Government Data (CVR brugervilk\u00e5r)` | yes | yes | no |\n| EITI \u2014 Extractive Industries Transparency Initiative (`eiti`) | `EITI open data (free reuse with attribution)` | yes | yes | no |\n| EveryPolitician (`everypolitician`) | `CC-BY-NC-4.0` | no | yes | no |\n| Firmenbuch \u2014 Austrian Commercial Register (`firmenbuch`) | `CC-BY-4.0` | yes | yes | no |\n| GLEIF (`gleif`) | `CC0-1.0` | yes | no | no |\n| INPI \u2014 Registre National des Entreprises (`inpi`) | `Licence Ouverte / Open Licence 2.0` | yes | yes | no |\n| JAR \u2014 Lithuanian Register of Legal Entities (`jar_lithuania`) | `CC-BY-4.0` | yes | yes | no |\n| KRS \u2014 Polish National Court Register (`krs_poland`) | `PL-OGD` | yes | yes | no |\n| KvK \u2014 Netherlands Chamber of Commerce (`kvk`) | `CC-BY-4.0` | yes | yes | no |\n| Malta Business Registry (MBR) (`malta_mbr`) | `CC-BY-4.0` | yes | yes | no |\n| New Zealand Companies Register (NZBN) (`nz_companies`) | `CC-BY-4.0` | yes | yes | no |\n| OpenAleph (`openaleph`) | `per-collection` | conditional | yes | no |\n| OpenCorporates (`opencorporates`) | `OC-Terms` | conditional | yes | yes |\n| OpenSanctions (`opensanctions`) | `CC-BY-NC-4.0` | no | yes | no |\n| PRH \u2014 Finnish Patent and Registration Office (`prh`) | `CC-BY-4.0` | yes | yes | no |\n| RPO Slovakia (`rpo_slovakia`) | `CC-BY-4.0` | yes | yes | no |\n| RPVS Slovakia (`rpvs_slovakia`) | `CC-BY-4.0` | yes | yes | no |\n| SEC EDGAR (Schedule 13D/13G) (`sec_edgar`) | `Public Domain` | yes | no | no |\n| Sudski registar \u2014 Croatian Court Register (`sudreg_croatia`) | `HR-OpenData` | yes | yes | no |\n| UR \u2014 Latvian Register of Enterprises (`ur_latvia`) | `Open Government Data (PSI Directive)` | yes | yes | no |\n| Wikidata (`wikidata`) | `CC0-1.0` | yes | no | no |\n| Wikirate (`wikirate`) | `CC-BY-4.0` | yes | yes | no |\n| Zefix \u2014 Swiss Commercial Registry (`zefix`) | `CC-BY-4.0` | yes | yes | no |\n\n# How combined licensing is assessed\n\nWhen a result combines several sources, the **most restrictive** licence applies to the bundle: a single non-commercial source (e.g. OpenSanctions `CC-BY-NC-4.0`) makes the whole export non-commercial. OpenCheck computes this verdict at export time (`opencheck.licensing.assess`).\n\n> This licensing summary is informational only and is not legal advice. Verify each source's licence terms before commercial use or redistribution.\n\n# Citations\n\n- https://github.com/StephenAbbott/opencheck/blob/main/ATTRIBUTIONS.md\n", "links": []}, {"id": "overview", "type": "Project", "title": "OpenCheck", "description": "An open beneficial-ownership and corporate-data aggregator that queries ~30 sources in parallel and synthesises a single Beneficial Ownership Data Standard (BODS) v0.4 view of a company and its owners.", "resource": "https://github.com/StephenAbbott/opencheck", "tags": ["beneficial-ownership", "BODS", "due-diligence", "open-data", "corporate-transparency"], "body": "# What OpenCheck is\n\nOpenCheck is an open tool for **beneficial-ownership and corporate due diligence**.\nGiven a company (by name, by national registration number, or by Legal Entity\nIdentifier), it queries around **30 open data sources in parallel** \u2014 national\ncompany registers, beneficial-ownership registers, cross-border aggregators,\nsanctions/PEP data and ESG sources \u2014 reconciles them by shared identifiers, and\nmaps the results into a single, standardised\n[BODS v0.4](/standards/bods.md) view of the entity, its people, and the\nownership/control relationships between them.\n\nThe goal is to make scattered, heterogeneous corporate data **comparable,\nlinkable and exportable** as an open standard, with the provenance and licence\nof every datum preserved.\n\n# What it produces\n\n- A **unified subject view**: entity + person + relationship statements in BODS\n  v0.4, visualised as an ownership graph (Open Ownership's BOVS conventions).\n- **Structural risk signals** \u2014 non-EU jurisdiction, FATF black/grey-list,\n  trust/arrangement, nominee, complex ownership layers, sanctioned/PEP\n  cross-matches \u2014 surfaced on the relevant statements.\n- **Reproducible exports** (BODS JSON / JSONL / XML, plus a manifest and a\n  per-source `LICENSES.md`) via the [export API](/api/export.md).\n- A **licensing compatibility verdict** so users know whether a combined export\n  is safe for commercial use (see the [licensing matrix](/licensing/matrix.md)).\n\n# How an agent should use this bundle\n\n1. Read [architecture](/architecture.md) for the request \u2192 BODS pipeline.\n2. Read [standards/bods.md](/standards/bods.md) to understand the output shape,\n   and [standards/lei-anchoring.md](/standards/lei-anchoring.md) for how lookups\n   resolve a company across registers.\n3. Browse [sources/](/sources/) for what each data source provides and its\n   licence; consult [licensing/matrix.md](/licensing/matrix.md) before reusing\n   exported data.\n4. Use the [api/](/api/) co can be read and edited by both humans and machines.", "resource": "https://www.wikidata.org/wiki/Wikidata:Main_Page", "tags": ["cdd", "aggregator", "CC0-1.0", "commercial-yes"], "body": "# Overview\n\nA free and open knowledge base that can be read and edited by both humans and machines. Aggregator, cross-border database or ESG source.\n\n- **Source id:** `wikidata`\n- **Category:** cdd (customer due diligence / compliance)\n- **Search kinds:** entity, person\n- **Requires API key:** no\n- **National register:** no\n\n\n# Licensing\n\n- **Licence:** `CC0-1.0` \u2014 Creative Commons Zero v1.0 (public domain)\n- **Commercial use:** yes \u00b7 **Attribution:** not required \u00b7 **Share-alike:** no\n- **Attribution line:** Wikidata structured data, CC0 1.0.\n- Public-domain dedication; no restrictions, no attribution required.\n\nSee the [licensing compatibility matrix](/licensing/matrix.md) for how this licence combines with others at export time.\n\n# BODS mapping\n\nRecords from this source are mapped to [Beneficial Ownership Data Standard (BODS) v0.4](/standards/bods.md)\nstatements by OpenCheck's mapper (`opencheck.bods.map_wikidata`). Cross-source\nidentifiers (LEI, national company numbers, Wikidata QIDs) are used to reconcile\nthis source with others.\n\n# Citations\n\n- https://www.wikidata.org/wiki/Wikidata:Main_Page\n", "links": ["licensing/matrix", "standards/bods"]}, {"id": "sources/wikirate", "type": "Data Source", "title": "Wikirate", "description": "Open, collaboratively-researched corporate ESG metric answers (environment, human rights, supply chains, governance) from designers such as the World Benchmarking Alliance and Net Zero Tracker. GODIN member; publishes LEI, Wikidata, OpenCorporates and other identifiers.", "resource": "https://wikirate.org/", "tags": ["esg", "aggregator", "CC-BY-4.0", "commercial-yes"], "body": "# Overview\n\nOpen, collaboratively-researched corporate ESG metric answers (environment, human rights, supply chains, governance) from designers such as the World Benchmarking Alliance and Net Zero Tracker. GODIN member; publishes LEI, Wikidata, OpenCorporates and other identifiers. Aggregator, cross-border database or ESG source.\n\n- **Source id:** `wikirate`\n- **Category:** esg (environmental, social & governance)\n- **Search kinds:** entity\n- **Requires API key:** yes\n- **National register:** no\n\n\n# Licensing\n\n- **Licence:** `CC-BY-4.0` \u2014 Creative Commons Attribution 4.0\n- **Commercial use:** yes \u00b7 **Attribution:** required \u00b7 **Share-alike:** no\n- **Attribution line:** Wikirate.org, licensed under CC BY 4.0\n- Commercial use permitted with attribution.\n\nSee the [licensing compatibility matrix](/licensing/matrix.md) for how this licence combines with others at export time.\n\n# BODS mapping\n\nRecords from this source are mapped to [Beneficial Ownership Data Standard (BODS) v0.4](/standards/bods.md)\nstatements by OpenCheck's mapper (`opencheck.bods.map_wikirate`). Cross-source\nidentifiers (LEI, national company numbers, Wikidata QIDs) are used to reconcile\nthis source with others.\n\n# Citations\n\n- https://wikirate.org/\n", "links": ["licensing/matrix", "standards/bods"]}, {"id": "sources/zefix", "type": "Data Source", "title": "Zefix \u2014 Swiss Commercial Registry", "description": "Swiss company data from the Federal Commercial Registry (Zefix / FCRO), sourced via the Swiss UID.", "resource": "https://www.zefix.ch/", "tags": ["cdd", "national-register", "CC-BY-4.0", "commercial-yes"], "body": "# Overview\n\nSwiss company data from the Federal Commercial Registry (Zefix / FCRO), sourced via the Swiss UID. Official national company / beneficial-ownership register.\n\n- **Source id:** `zefix`\n- **Category:** cdd (customer due diligence / compliance)\n- **Search kinds:** entity\n- **Requires API key:** yes\n- **National register:** yes\n- **Lookup keys (LEI-anchored dispatch):** `che_uid`\n\n# Licensing\n\n- **Licence:** `CC-BY-4.0` \u2014 Creative Commons Attribution 4.0\n- **Commercial use:** yes \u00b7 **Attribution:** required \u00b7 **Share-alike:** no\n- **Attribution line:** Contains data from the Swiss Federal Commercial Registry Office (FCRO / EHRA) via Zefix, available under CC BY 4.0.\n- Commercial use permitted with attribution.\n\nSee the [licensing compatibility matrix](/licensing/matrix.md) for how this licence combines with others at export time.\n\n# BODS mapping\n\nRecords from this source are mapped to [Beneficial Ownership Data Standard (BODS) v0.4](/standards/bods.md)\nstatements by OpenCheck's mapper (`opencheck.bods.map_zefix`). Cross-source\nidentifiers (LEI, national company numbers, Wikidata QIDs) are used to reconcile\nthis source with others.\n\n# Citations\n\n- https://www.zefix.ch/\n", "links": ["licensing/matrix", "standards/bods"]}, {"id": "standards/bods", "type": "Data Standard", "title": "Beneficial Ownership Data Standard (BODS) v0.4", "description": "The open standard OpenCheck emits \u2014 entity, person and relationship statements that describe who owns and controls companies.", "resource": "https://standard.openownership.org/en/0.4.0/", "tags": ["BODS", "data-standard", "beneficial-ownership", "open-ownership"], "body": "# Overview\n\nBODS, maintained by [Open Ownership](https://www.openownership.org/en/), is a\nstructured, open standard for publishing **who owns and controls companies**.\nOpenCheck targets **version 0.4**. Every source OpenCheck queries is mapped into\nBODS so heterogeneous registers become directly comparable and linkable.\n\nBODS represents *declarations* (statements) about ownership, not just a static\ngraph \u2014 which lets it carry provenance, dates, and the lifecycle of a record.\n\n# Statement types\n\n| Record type | Describes |\n|---|---|\n| **entity** | A legal entity \u2014 `entityType.type` is `registeredEntity`, `arrangement`, `anonymousEntity`, etc. Carries name, jurisdiction, identifiers. |\n| **person** | A natural person \u2014 `personType` is `knownPerson`, `anonymousPerson`, or `unknownPerson`. |\n| **relationship** | An ownership-or-control link: a `subject`, an `interestedParty`, and one or more `interests`. |\n\nEach statement has a `statementId`, a `recordId` (stable across a record's\nlifecycle), a `recordStatus` (`new` / `updated` / `closed`), a `statementDate`,\n`publicationDetails`, and a `source` block.\n\n# Interest types OpenCheck emits\n\n`shareholding`, `votingRights`, `appointmentOfBoard`, `seniorManagingOfficial`,\n`otherInfluenceOrControl`, `rightsToSurplusAssetsOnDissolution`, `boardMember`,\n`nominee`, `nominator`, `unknownInterest`, `unpublishedInterest`.\n\n# Modelling conventions used in OpenCheck\n\n- **Directors / managing officials** \u2192 `seniorManagingOfficial` interest.\n- **Nominee arrangements** (UK ROE land-nominee codes) \u2192 a synthetic\n  `arrangement` / `nomination` entity with `nominator` and `nominee`\n  relationships, not a bare `nominee` interest. (See the nominee modelling\n  guidance in the citations.)\n- **Super-secure PSCs** (details withheld by court order) \u2192 an\n  `anonymousPerson` whose relationship carries an `unpublishedInterest` with the\n  official Companies House explanatory text.\n- **Missing information** (e.g. \"company believes there is no PSC\") \u2192 an\n  ownership-or-control statement with an *unspecified* `interestedParty` carrying\n  a `reason` from the BODS `unspecifiedReason` codelist (`noBeneficialOwners`,\n  `subjectUnableToConfirmOrIdentifyBeneficialOwner`, \u2026).\n- **Lifecycle:** a ceased relationship becomes a `closed` record (stable\n  `recordId`, `replacesStatements` \u2192 the original `new`).\n\n# Exporting BODS from OpenCheck\n\nThe [export API](/api/export.md) returns BODS as JSON, JSONL, canonical XML, or a\nZIP bundle (BODS + manifest + `LICENSES.md`). Output passes a shape validator and\ncan be checked against `lib-cove-bods`.\n\n# Citations\n\n- https://standard.openownership.org/en/0.4.0/\n- https://standard.openo iregister) | `RA000181` |\n\nA local id can appear under `entity.registeredAs`,\n`registration.validatedAs`, or `registration.otherValidationAuthorities`, so\nreverse lookups query all three and always pair the id with the RA code to avoid\ncollisions across registers.\n\n# Citations\n\n- https://www.gleif.org/\n- https://www.gleif.org/en/lei-data/gleif-golden-copy\n", "links": []}]};
const PALETTE = ["#3d30d4","#1f9d4e","#c2410c","#0369a1","#6d28d9","#be123c","#9a3412","#0f766e","#a16207"];
const types = [...new Set(BUNDLE.concepts.map(c => c.type))].sort();
const colorOf = {}; types.forEach((t,i)=> colorOf[t]=PALETTE[i % PALETTE.length]);
const byId = Object.fromEntries(BUNDLE.concepts.map(c=>[c.id,c]));
const active = new Set(types);

const elements = [];
BUNDLE.concepts.forEach(c => elements.push({ data:{ id:c.id, label:c.title, type:c.type } }));
BUNDLE.concepts.forEach(c => c.links.forEach(t => elements.push({ data:{ id:c.id+"->"+t, source:c.id, target:t } })));

const cy = cytoscape({
  container: document.getElementById("cy"),
  elements,
  style: [
    { selector:"node", style:{ "background-color":(e)=>colorOf[e.data("type")]||"#888",
      "label":"data(label)","font-size":"9px","color":"#191d23","text-wrap":"wrap","text-max-width":"110px",
      "text-valign":"bottom","text-margin-y":3,"width":16,"height":16 } },
    { selector:"edge", style:{ "width":1,"line-color":"#cfcfe6","target-arrow-color":"#cfcfe6",
      "target-arrow-shape":"triangle","curve-style":"bezier","arrow-scale":0.7 } },
    { selector:".dim", style:{ "opacity":0.12 } },
    { selector:"node.sel", style:{ "border-width":3,"border-color":"#191d23" } },
  ],
  layout:{ name:"cose", animate:false, padding:30, nodeRepulsion:9000, idealEdgeLength:90 },
});

function renderTypes(){
  const el = document.getElementById("types");
  el.innerHTML = "";
  types.forEach(t => {
    const lab = document.createElement("label");
    lab.innerHTML = `<input type="checkbox" checked data-t="${t}"><span class="swatch" style="background:${colorOf[t]}"></span>${t}`;
    el.appendChild(lab);
  });
  el.querySelectorAll("input").forEach(cb => cb.onchange = () => {
    cb.checked ? active.add(cb.dataset.t) : active.delete(cb.dataset.t);
    applyFilter();
  });
}
function applyFilter(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  cy.nodes().forEach(n => {
    const c = byId[n.id()];
    const matchType = active.has(c.type);
    const matchText = !q || c.title.toLowerCase().includes(q) || c.id.toLowerCase().includes(q)
      || (c.tags||[]).some(tag => String(tag).toLowerCase().includes(q));
    n.style("display", (matchType && matchText) ? "element" : "none");
  });
  cy.edges().forEach(e => {
    e.style("display", (e.source().style("display")!=="none" && e.target().style("display")!=="none") ? "element":"none");
  });
}
function citedBy(id){ return BUNDLE.concepts.filter(c => c.links.includes(id)); }

function select(id){
  const c = byId[id]; if(!c) return;
  cy.nodes().removeClass("sel"); cy.getElementById(id).addClass("sel");
  const d = document.getElementById("detail");
  const tags = (c.tags||[]).map(t=>`<span class="chip">${t}</span>`).join("");
  const res = c.resource ? `<p><a class="res" href="${c.resource}" target="_blank" rel="noreferrer">${c.resource} ↗</a></p>` : "";
  const back = citedBy(id);
  const backHtml = back.length ? `<div class="eyebrow">Cited by</div><div class="backlinks">${back.map(b=>`<a href="#" data-go="${b.id}">${b.title}</a>`).join("")}</div>` : "";
  d.innerHTML = `<span class="chip" style="border-color:${colorOf[c.type]};color:${colorOf[c.type]}">${c.type}</span>
    <h2>${c.title}</h2><p class="desc">${c.description||""}</p>${res}
    <div class="body">${marked.parse(c.body||"")}</div>${backHtml}`;
  // rewire internal links + backlinks to navigate within the viewer
  d.querySelectorAll(".body a").forEach(a => {
    const href = a.getAttribute("href")||"";
    const tid = resolveHref(href, id);
    if(tid && byId[tid]){ a.onclick = (e)=>{ e.preventDefault(); select(tid); }; }
  });
  d.querySelectorAll("[data-go]").forEach(a => a.onclick = (e)=>{ e.preventDefault(); select(a.dataset.go); });
}
function resolveHref(href, fromId){
  if(!href || href.startsWith("http")) return null;
  href = href.split("#")[0];
  let target;
  if(href.startsWith("/")) target = href.slice(1);
  else { const base = fromId.includes("/")? fromId.slice(0, fromId.lastIndexOf("/")) : "";
    const parts = (base?base.split("/"):[]).concat(href.split("/")); const st=[];
    parts.forEach(p=>{ if(p===""||p===".")return; if(p===".."){st.pop();} else st.push(p); }); target=st.join("/"); }
  if(target.endsWith(".md")) target = target.slice(0,-3);
  if(target.endsWith("/index")) target = target.slice(0,-6);
  return target;
}

cy.on("tap","node", e => select(e.target.id()));
document.getElementById("q").addEventListener("input", applyFilter);
document.getElementById("count").textContent = BUNDLE.concepts.length + " concepts · " + types.length + " types";
renderTypes();
</script>
</body>
</html>
