name: Tests

# Gates every push and PR on the deterministic test suites. The live-API smoke
# tier runs separately (live-smoke.yml, weekly) so a transient upstream blip can
# never block a merge; the drift checks live in vendored-enum-drift.yml.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
      - name: Install backend (with test deps)
        run: uv sync
        working-directory: backend
      - name: Backend test suite
        # Live tests are @pytest.mark.live and skipped unless --run-live, so this
        # is fully offline/deterministic.
        run: uv run pytest -q
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm ci
        working-directory: frontend
      - name: Type-check + build
        run: npm run build
        working-directory: frontend
      - name: Unit tests
        run: npm test
        working-directory: frontend
