<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenCheck</title>
    <!--
      Beneficial Ownership design-system fonts (CC BY 4.0):
        Bitter — headings (matches beneficialownership.co.uk)
        DM Sans — body / labels
        DM Mono — codes, identifiers, link indices
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-oo-bg text-oo-ink antialiased font-body">
    <div id="root"></div>
    <!--
      @openownership/bods-dagre is a UMD bundle that assigns to a
      global ``var BODSDagre``. Its package.json declares
      ``"type": "module"``, so Vite imports it as ESM and the ``var``
      ends up module-scoped instead of global. We side-step that by
      loading it as a classic (non-module) script — the file is copied
      into ``public/`` by the vite plugin in ``vite.config.ts``.
    -->
    <script src="/bods-dagre.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
